<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ȘOA vs LIL</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#0b5d1e;
    font-family:Arial;
    touch-action:none;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    background:
    linear-gradient(to bottom,#1f7d32,#0b5d1e);
}

#goal{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    height:120px;
    border:8px solid white;
    border-bottom:none;
}

#goalkeeper{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    font-size:70px;
    transition:0.2s;
}

#ball{
    position:absolute;
    bottom:140px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    transition:0.05s linear;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:32px;
    font-weight:bold;
}

#message{
    position:absolute;
    top:45%;
    width:100%;
    text-align:center;
    font-size:60px;
    color:yellow;
    font-weight:bold;
    display:none;
    text-shadow:3px 3px 10px black;
}

.controls{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
}

.btn{
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    font-size:35px;
    background:white;
    box-shadow:0 0 10px black;
}

#shootBtn{
    background:gold;
}

</style>
</head>

<body>

<div id="game">

<div id="score">SCOR 0</div>

<div id="goal"></div>

<div id="goalkeeper">🧔</div>

<div id="ball">⚽</div>

<div id="message"></div>

<div class="controls">
    <button class="btn" onclick="moveLeft()">⬅️</button>
    <button class="btn" id="shootBtn" onclick="shoot()">⚽</button>
    <button class="btn" onclick="moveRight()">➡️</button>
</div>

</div>

<script>

const ball = document.getElementById("ball");
const keeper = document.getElementById("goalkeeper");
const message = document.getElementById("message");
const scoreText = document.getElementById("score");

let score = 0;

let ballX = window.innerWidth / 2;

function updateBall(){
    ball.style.left = ballX + "px";
}

function moveLeft(){
    ballX -= 40;

    if(ballX < 40){
        ballX = 40;
    }

    updateBall();
}

function moveRight(){
    ballX += 40;

    if(ballX > window.innerWidth - 40){
        ballX = window.innerWidth - 40;
    }

    updateBall();
}

document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowLeft"){
        moveLeft();
    }

    if(e.key==="ArrowRight"){
        moveRight();
    }

    if(e.key===" "){
        shoot();
    }

});

function moveKeeper(){

    const positions = [
        window.innerWidth/2 - 120,
        window.innerWidth/2,
        window.innerWidth/2 + 120
    ];

    const randomPos =
    positions[Math.floor(Math.random()*positions.length)];

    keeper.style.left = randomPos + "px";
}

setInterval(moveKeeper,700);

function shoot(){

    let topPos = window.innerHeight - 160;

    const targetX = ballX;

    const interval = setInterval(()=>{

        topPos -= 25;

        ball.style.top = topPos + "px";
        ball.style.bottom = "auto";

        if(topPos < 140){

            clearInterval(interval);

            checkGoal(targetX);

            resetBall();
        }

    },20);
}

function checkGoal(targetX){

    const keeperX = keeper.offsetLeft;

    const diff = Math.abs(targetX - keeperX);

    const goalAreaLeft = window.innerWidth/2 - 150;
    const goalAreaRight = window.innerWidth/2 + 150;

    if(targetX < goalAreaLeft ||
       targetX > goalAreaRight){

        showMessage("PE LÂNGĂ!", "red");
        return;
    }

    if(diff < 70){

        showMessage("APĂRAT!", "orange");
        return;
    }

    score++;

    scoreText.innerHTML = "SCOR " + score;

    showMessage("GOOOOL!", "yellow");
}

function resetBall(){

    setTimeout(()=>{

        ball.style.top = "auto";
        ball.style.bottom = "140px";

    },200);
}

function showMessage(text,color){

    message.innerHTML = text;
    message.style.color = color;
    message.style.display = "block";

    setTimeout(()=>{
        message.style.display = "none";
    },1200);
}

updateBall();

</script>

</body>
</html>
