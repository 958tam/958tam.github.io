<!DOCTYPE html> <html lang="ro"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>ȘOA vs LIL - Arcade</title> <style> *{ box-sizing:border-box; user-select:none; -webkit-user-select:none; } body{ margin:0; overflow:hidden; font-family:Arial, sans-serif; background:#111; touch-action:none; } #menu{ position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:20px; background: linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.7)), url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=1400&auto=format&fit=crop'); background-size:cover; background-position:center; color:white; z-index:10; text-align:center; padding:20px; } h1{ margin:0; font-size:50px; text-shadow:0 0 15px black; } .subtitle{ font-size:20px; opacity:.9; } .team-buttons, .player-buttons{ display:flex; gap:15px; flex-wrap:wrap; justify-content:center; } .btn{ padding:14px 22px; border:none; border-radius:16px; font-size:20px; font-weight:bold; cursor:pointer; background:white; min-width:140px; box-shadow:0 0 15px rgba(0,0,0,.4); } .btn:active{ transform:scale(.95); } .hidden{ display:none !important; } #game{ width:100vw; height:100vh; position:relative; background: linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.3)), linear-gradient(to bottom,#2f8b3b,#15551e); overflow:hidden; } .stadiumLights{ position:absolute; top:0; width:100%; height:220px; background: radial-gradient(circle at 10% 20%, rgba(255,255,255,.35), transparent 12%), radial-gradient(circle at 90% 20%, rgba(255,255,255,.35), transparent 12%); pointer-events:none; } .crowd{ position:absolute; top:0; width:100%; height:230px; background: repeating-linear-gradient( 90deg, #1d1d1d 0 8px, #333 8px 16px ); opacity:.3; } #scoreboard{ position:absolute; top:10px; left:50%; transform:translateX(-50%); background:#111; color:white; border:4px solid gold; border-radius:18px; padding:12px 22px; font-size:24px; font-weight:bold; z-index:5; box-shadow:0 0 15px rgba(0,0,0,.5); } #timer{ position:absolute; top:85px; left:50%; transform:translateX(-50%); background:#000; color:#00ff88; padding:8px 20px; border-radius:12px; font-size:26px; font-weight:bold; z-index:5; } #goal{ position:absolute; top:120px; left:50%; transform:translateX(-50%); width:340px; height:150px; border:10px solid white; border-bottom:none; background:rgba(255,255,255,.05); } #goalNet{ position:absolute; inset:0; background-image: linear-gradient(white 2px, transparent 2px), linear-gradient(90deg, white 2px, transparent 2px); background-size:30px 30px; opacity:.25; } .character{ position:absolute; transition:.15s linear; } #goalkeeper{ top:165px; left:50%; transform:translateX(-50%); font-size:85px; z-index:3; } #supportPlayer{ top:210px; left:65%; font-size:55px; opacity:.85; } #player{ bottom:110px; left:50%; transform:translateX(-50%); font-size:90px; z-index:4; } #ball{ position:absolute; bottom:150px; left:50%; transform:translateX(-50%); font-size:52px; z-index:4; transition:.05s linear; } #message{ position:absolute; top:42%; width:100%; text-align:center; font-size:70px; font-weight:bold; display:none; z-index:20; text-shadow:0 0 20px black; } #level{ position:absolute; right:12px; top:12px; color:white; font-size:24px; background:rgba(0,0,0,.5); padding:10px 16px; border-radius:12px; } .controls{ position:absolute; bottom:18px; width:100%; display:flex; justify-content:center; gap:20px; z-index:10; } .controlBtn{ width:90px; height:90px; border:none; border-radius:50%; font-size:35px; background:white; box-shadow:0 0 15px black; } #shootBtn{ background:gold; } #swipeText{ position:absolute; bottom:125px; width:100%; text-align:center; color:white; opacity:.85; font-size:18px; } #gameOver{ position:absolute; inset:0; background:rgba(0,0,0,.82); display:none; justify-content:center; align-items:center; flex-direction:column; z-index:30; color:white; text-align:center; gap:20px; } #gameOver h2{ font-size:56px; margin:0; } .finalScore{ font-size:38px; } </style> </head> <body> <div id="menu"> <h1>⚽ ȘOA vs LIL</h1> <div class="subtitle"> Alege echipa și câștigă meciul! </div> <div id="teamSelection" class="team-buttons"> <button class="btn" onclick="chooseTeam('SOA')">ȘOA</button> <button class="btn" onclick="chooseTeam('LIL')">LIL</button> </div> <div id="playerSelection" class="player-buttons hidden"></div> </div> <div id="game" class="hidden"> <div class="crowd"></div> <div class="stadiumLights"></div> <div id="scoreboard"> ȘOA <span id="soaScore">0</span> - <span id="lilScore">0</span> LIL </div> <div id="timer">60</div> <div id="level">LEVEL 1</div> <div id="goal"> <div id="goalNet"></div> </div> <div id="goalkeeper" class="character">🧔</div> <div id="supportPlayer" class="character"></div> <div id="player" class="character">🧒</div> <div id="ball">⚽</div> <div id="message"></div> <div id="swipeText"> Swipe pe ecran sau folosește butoanele </div> <div class="controls"> <button class="controlBtn" id="leftBtn">⬅️</button> <button class="controlBtn" id="shootBtn">⚽</button> <button class="controlBtn" id="rightBtn">➡️</button> </div> </div> <div id="gameOver"> <h2>MECI TERMINAT</h2> <div class="finalScore" id="finalScore"></div> <button class="btn" onclick="location.reload()"> REJOACĂ </button> </div> <script> const menu = document.getElementById("menu"); const playerSelection = document.getElementById("playerSelection"); const game = document.getElementById("game"); const player = document.getElementById("player"); const keeper = document.getElementById("goalkeeper"); const supportPlayer = document.getElementById("supportPlayer"); const ball = document.getElementById("ball"); const soaScoreText = document.getElementById("soaScore"); const lilScoreText = document.getElementById("lilScore"); const timerText = document.getElementById("timer"); const message = document.getElementById("message"); const levelText = document.getElementById("level"); const gameOver = document.getElementById("gameOver"); const finalScore = document.getElementById("finalScore"); let team = ""; let selectedPlayer = ""; let soaScore = 0; let lilScore = 0; let gameTime = 60; let level = 1; let playerX = window.innerWidth / 2; let keeperSpeed = 700; const sounds = { goal:new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"), save:new Audio("https://assets.mixkit.co/active_storage/sfx/2058/2058-preview.mp3"), miss:new Audio("https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3") }; function chooseTeam(chosen){ team = chosen; playerSelection.innerHTML = ""; playerSelection.classList.remove("hidden"); if(chosen === "SOA"){ playerSelection.innerHTML = ` <button class="btn" onclick="startGame('TUD')"> Tud #20 </button> <button class="btn" onclick="startGame('DAV')"> Dav #18 </button> `; }else{ playerSelection.innerHTML = ` <button class="btn" onclick="startGame('TATI')"> Tati #89 </button> `; } } function startGame(playerName){ selectedPlayer = playerName; menu.classList.add("hidden"); game.classList.remove("hidden"); configureCharacters(); startTimer(); startKeeperMovement(); } function configureCharacters(){ if(selectedPlayer === "DAV"){ player.innerHTML = "🧒"; keeper.innerHTML = "🧔"; supportPlayer.innerHTML = "👦"; } if(selectedPlayer === "TUD"){ player.innerHTML = "👦"; keeper.innerHTML = "🧔"; supportPlayer.innerHTML = "🧒"; } if(selectedPlayer === "TATI"){ player.innerHTML = "🧔"; const randomKid = Math.random() > .5 ? "🧒" : "👦"; keeper.innerHTML = randomKid; supportPlayer.innerHTML = randomKid === "🧒" ? "👦" : "🧒"; } } function moveLeft(){ playerX -= 40; if(playerX < 50){ playerX = 50; } updatePositions(); } function moveRight(){ playerX += 40; if(playerX > window.innerWidth - 50){ playerX = window.innerWidth - 50; } updatePositions(); } function updatePositions(){ player.style.left = playerX + "px"; ball.style.left = playerX + "px"; } function shoot(targetX = playerX){ let topPos = window.innerHeight - 170; const interval = setInterval(()=>{ topPos -= 28; ball.style.top = topPos + "px"; ball.style.bottom = "auto"; if(topPos < 185){ clearInterval(interval); evaluateShot(targetX); resetBall(); } },16); } function evaluateShot(targetX){ const goalLeft = window.innerWidth/2 - 170; const goalRight = window.innerWidth/2 + 170; const keeperX = keeper.offsetLeft; const distance = Math.abs(targetX - keeperX); if(targetX < goalLeft || targetX > goalRight){ sounds.miss.play(); showMessage("PE LÂNGĂ!", "#ff3b3b"); return; } if(distance < 80){ sounds.save.play(); showMessage("APĂRAT!", "#ffaa00"); return; } sounds.goal.play(); showMessage("GOOOOL!", "#ffe600"); if(team === "SOA"){ soaScore++; soaScoreText.innerHTML = soaScore; }else{ lilScore++; lilScoreText.innerHTML = lilScore; } increaseDifficulty(); } function increaseDifficulty(){ const totalGoals = soaScore + lilScore; if(totalGoals >= 3){ level = 2; } if(totalGoals >= 6){ level = 3; } if(totalGoals >= 10){ level = 4; } levelText.innerHTML = "LEVEL " + level; keeperSpeed = Math.max(250,700 - (level * 100)); } function resetBall(){ setTimeout(()=>{ ball.style.top = "auto"; ball.style.bottom = "150px"; },150); } function showMessage(text,color){ message.innerHTML = text; message.style.color = color; message.style.display = "block"; setTimeout(()=>{ message.style.display = "none"; },1000); } let keeperInterval; function startKeeperMovement(){ keeperInterval = setInterval(()=>{ const positions = [ window.innerWidth/2 - 130, window.innerWidth/2, window.innerWidth/2 + 130 ]; const randomPos = positions[Math.floor(Math.random()*positions.length)]; keeper.style.left = randomPos + "px"; },keeperSpeed); } function startTimer(){ const interval = setInterval(()=>{ gameTime--; timerText.innerHTML = gameTime; if(gameTime <= 0){ clearInterval(interval); endGame(); } },1000); } function endGame(){ gameOver.style.display = "flex"; finalScore.innerHTML = ` ȘOA ${soaScore} - ${lilScore} LIL `; } document.getElementById("leftBtn") .addEventListener("touchstart",(e)=>{ e.preventDefault(); moveLeft(); }); document.getElementById("rightBtn") .addEventListener("touchstart",(e)=>{ e.preventDefault(); moveRight(); }); document.getElementById("shootBtn") .addEventListener("touchstart",(e)=>{ e.preventDefault(); shoot(); }); document.getElementById("leftBtn") .addEventListener("click",moveLeft); document.getElementById("rightBtn") .addEventListener("click",moveRight); document.getElementById("shootBtn") .addEventListener("click",()=>shoot()); document.addEventListener("keydown",(e)=>{ if(e.key === "ArrowLeft"){ moveLeft(); } if(e.key === "ArrowRight"){ moveRight(); } if(e.key === " "){ shoot(); } }); let swipeStartX = 0; document.addEventListener("touchstart",(e)=>{ swipeStartX = e.touches[0].clientX; }); document.addEventListener("touchend",(e)=>{ let endX = e.changedTouches[0].clientX; let diff = endX - swipeStartX; if(Math.abs(diff) > 40){ if(diff < 0){ moveLeft(); }else{ moveRight(); } }else{ shoot(endX); } }); updatePositions(); </script> </body> </html>
