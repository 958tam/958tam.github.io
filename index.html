<style>

*{

    box-sizing:border-box;
}

body{

    color:white;

/* COVER */

.hero{

    height:45vh;
    background:url('cover.png') center center/cover no-repeat;

    justify-content:center;

        rgba(0,0,0,0.75)

/* TITLU */

.title{

    z-index:2;

    width:100%;

    text-align:center;

    font-size:3.8vw;

    line-height:1.2;

    letter-spacing:2px;

    color:white;

    text-shadow:
        0 0 10px rgba(0,0,0,0.7),
        0 0 25px rgba(0,0,0,0.8);
}

/* SOCIAL BAR */

.social-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    padding:18px 10px;

    background:#181818;

    border-top:1px solid rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);

    flex-wrap:wrap;
}

.social-bar a{
    width:48px;
    height:48px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:50%;

    text-decoration:none;

    font-size:20px;

    color:white;

    background:rgba(255,255,255,0.08);

    transition:0.3s;
}

.social-bar a:hover{
    transform:translateY(-5px) scale(1.08);

    background:rgba(255,0,0,0.25);
}

/* MUSIC BAR */

.music-section{

    position:relative;

    height:72px;

    background:
    linear-gradient(
        to right,
        rgba(255,0,0,0.08),
        rgba(255,255,255,0.02),
        rgba(255,0,0,0.08)
    );

    border-top:1px solid rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:0 14px;

    overflow:hidden;
}

/* VISUALIZER */

.visualizer-container{

    flex:1;

    height:100%;

    display:flex;
    align-items:center;
}

#visualizer{

    width:100%;
    height:50px;

}

/* BUTTON */

.music-btn{

    width:44px;
    height:44px;

    min-width:44px;

    margin-left:14px;

    border:none;

    border-radius:50%;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

    backdrop-filter:blur(10px);

    z-index:5;
}

.music-btn:hover{

    transform:scale(1.08);

    background:rgba(255,0,0,0.25);
}

/* TILES */

.tiles-section{

    padding:45px 20px;

    max-width:1100px;

    margin:auto;
}

.tiles-grid{

    display:grid;

    grid-template-columns:repeat(2, 1fr);

    gap:22px;
}

/* MOBILE */

@media(max-width:700px){

    .tiles-grid{

        grid-template-columns:repeat(2, 1fr);

        gap:14px;
    }

    .tile{

        height:150px;

        border-radius:18px;
    }

    .tile-title{

        font-size:18px;
    }

    .tile-overlay{

        padding:14px;
    }
}

.tile{

    position:relative;

    height:190px;

    border-radius:24px;

    overflow:hidden;

    text-decoration:none;

    background:#1a1a1a;

    transition:0.4s;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 0 20px rgba(0,0,0,0.35);
}

.tile:hover{

    transform:translateY(-8px) scale(1.02);

    box-shadow:
        0 0 30px rgba(255,0,0,0.18);
}

.tile img{

    width:100%;
    height:100%;

    object-fit:cover;

    transition:0.5s;
}

.tile:hover img{

    transform:scale(1.08);
}

.tile-overlay{

    position:absolute;

    inset:0;

    background:
        linear-gradient(
            to top,
            rgba(0,0,0,0.88),
            rgba(0,0,0,0.15)

.tile-title{

<script>

const music = document.getElementById("bgMusic");
const icon = document.getElementById("musicIcon");

const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

let playing = false;

let audioContext;
let analyser;
let source;
let dataArray;
let animationId;

function resizeCanvas(){

    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}

resizeCanvas();

window.addEventListener("resize", resizeCanvas);

function setupAudio(){

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioContext.createAnalyser();

    analyser.fftSize = 256;

    const bufferLength = analyser.frequencyBinCount;

    dataArray = new Uint8Array(bufferLength);

    source = audioContext.createMediaElementSource(music);

    source.connect(analyser);

    analyser.connect(audioContext.destination);
}

function drawVisualizer(){

    animationId = requestAnimationFrame(drawVisualizer);

    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const bars = 64;

    const barWidth = canvas.width / bars;

    for(let i = 0; i < bars; i++){

        let value = dataArray[i];

        let percent = value / 255;

        let height = canvas.height * percent;

        let offset = canvas.height - height;

        const gradient = ctx.createLinearGradient(
            0,
            offset,
            0,
            canvas.height
        );

        gradient.addColorStop(0,"#ffffff");
        gradient.addColorStop(0.4,"#ff0000");
        gradient.addColorStop(1,"rgba(255,0,0,0.05)");

        ctx.fillStyle = gradient;

        ctx.shadowBlur = 18;
        ctx.shadowColor = "#ff0000";

        ctx.fillRect(
            i * barWidth,
            offset,
            barWidth - 2,
            height
        );
    }
}

async function toggleMusic(){

    if(!audioContext){

        setupAudio();
    }

    if(!playing){

        await audioContext.resume();

        await music.play();

        drawVisualizer();

        icon.classList.remove("fa-volume-up");
        icon.classList.add("fa-volume-xmark");

        playing = true;

    }else{

        music.pause();

        cancelAnimationFrame(animationId);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        icon.classList.remove("fa-volume-xmark");
        icon.classList.add("fa-volume-up");

        playing = false;
    }
}

</script>
