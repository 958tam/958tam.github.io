<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universul #TAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    overflow-x:hidden;
}

/* COVER */

.hero{
    position:relative;
    height:45vh;
    background:url('cover.png') center center/cover no-repeat;
    display:flex;
    align-items:flex-end;
    justify-content:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.75)
    );
}

/* TITLU */

.title{
    position:relative;
    z-index:2;

    width:100%;
    padding:40px 15px;

    text-align:center;

    font-family:'Permanent Marker',cursive;

    font-size:3.8vw;

    line-height:1.2;

    letter-spacing:2px;

    color:white;

    text-shadow:
        0 0 10px rgba(0,0,0,0.7),
        0 0 25px rgba(0,0,0,0.8);
}

/* SOCIAL BAR */

.social-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    padding:18px 10px;

    background:#181818;

    border-top:1px solid rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.social-bar a{
    width:48px;
    height:48px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:50%;

    text-decoration:none;

    font-size:20px;

    color:white;

    background:rgba(255,255,255,0.08);

    transition:0.3s;
}

.social-bar a:hover{
    transform:translateY(-5px) scale(1.08);

    background:rgba(255,255,255,0.18);
}

/* MUSIC VISUALIZER */

.music-section{
    position:relative;

    height:180px;

    overflow:hidden;

    background:
    radial-gradient(circle at center,
    rgba(0,255,255,0.12),
    transparent 60%),
    linear-gradient(to bottom,
    #111,
    #050505);

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;
}

.visualizer{
    display:flex;

    align-items:flex-end;

    gap:6px;

    height:90px;

    z-index:2;
}

.bar{
    width:10px;

    border-radius:20px;

    background:linear-gradient(
        to top,
        #00ffff,
        #ffffff
    );

    animation:beat 1s infinite ease-in-out;

    box-shadow:
        0 0 10px #00ffff,
        0 0 25px rgba(0,255,255,0.6);
}

.bar:nth-child(1){height:25px;animation-delay:0.1s;}
.bar:nth-child(2){height:60px;animation-delay:0.3s;}
.bar:nth-child(3){height:40px;animation-delay:0.5s;}
.bar:nth-child(4){height:80px;animation-delay:0.2s;}
.bar:nth-child(5){height:50px;animation-delay:0.4s;}
.bar:nth-child(6){height:90px;animation-delay:0.6s;}
.bar:nth-child(7){height:45px;animation-delay:0.2s;}
.bar:nth-child(8){height:70px;animation-delay:0.5s;}
.bar:nth-child(9){height:35px;animation-delay:0.3s;}
.bar:nth-child(10){height:85px;animation-delay:0.7s;}

@keyframes beat{
    0%{
        transform:scaleY(1);
    }

    50%{
        transform:scaleY(1.8);
    }

    100%{
        transform:scaleY(1);
    }
}

/* GLOW EFFECT */

.music-section::before{
    content:"";

    position:absolute;

    width:300px;
    height:300px;

    background:rgba(0,255,255,0.08);

    border-radius:50%;

    filter:blur(60px);

    animation:pulse 4s infinite ease-in-out;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:0.5;
    }

    50%{
        transform:scale(1.3);
        opacity:1;
    }

    100%{
        transform:scale(1);
        opacity:0.5;
    }
}

/* MUSIC BUTTON */

.music-btn{
    margin-top:22px;

    z-index:2;

    border:none;

    background:rgba(255,255,255,0.08);

    color:white;

    width:60px;
    height:60px;

    border-radius:50%;

    font-size:24px;

    cursor:pointer;

    transition:0.3s;

    backdrop-filter:blur(10px);
}

.music-btn:hover{
    transform:scale(1.1);

    background:rgba(255,255,255,0.15);
}

/* CONTINUT */

.content{
    padding:40px 25px;
    max-width:900px;
    margin:auto;
}

.content h2{
    font-size:32px;
    margin-bottom:20px;
}

.content p{
    color:#ccc;
    line-height:1.8;
    font-size:18px;
}

/* FOOTER BANNER */

.footer-banner{
    position:relative;

    height:160px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,0.2),
            rgba(0,0,0,0.8)
        ),
        url('footer.png') center center/cover no-repeat;
}

/* FOOTER */

.footer{
    background:#0a0a0a;

    text-align:center;

    padding:50px 20px;
}

.footer-logo{
    font-family:'Permanent Marker',cursive;

    font-size:34px;

    margin-bottom:18px;

    letter-spacing:2px;
}

.footer-quote{
    color:#999;

    font-size:16px;

    line-height:1.8;

    max-width:700px;

    margin:auto auto 35px auto;
}

.footer-social{
    display:flex;

    justify-content:center;

    gap:20px;

    margin-bottom:30px;

    flex-wrap:wrap;
}

.footer-social a{
    color:white;

    font-size:22px;

    transition:0.3s;
}

.footer-social a:hover{
    transform:scale(1.2);

    color:#ccc;
}

.footer-copy{
    color:#666;

    font-size:14px;
}

</style>
</head>

<body>

<section class="hero">

    <div class="title">

    <a href="https://www.instagram.com/958.tam.fam?igsh=MWE1OWh0eWlubDBuMw==" target="_blank">

    <a href="https://x.com/TAM958Universe" target="_blank">

    </a>

</section>

<!-- MUSIC VISUALIZER -->

<section class="music-section">

    <div class="visualizer">

        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>

    </div>

    <button class="music-btn" onclick="toggleMusic()">
        <i id="musicIcon" class="fas fa-volume-up"></i>
    </button>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

</section>

<section class="content">

    <h2>Începutul</h2>

    </p>

<footer class="footer">

    </div>

    <div class="footer-quote">
        Știm că este puțin, dar orice construcție se realizează în timp.
    </div>

    <div class="footer-social">

        <a href="https://youtube.com/@tam958universe?si=tH4ilL0TK9Gzuht8" target="_blank">
            <i class="fab fa-youtube"></i>
        </a>

        <a href="https://www.facebook.com/share/18qTg2ix7w/" target="_blank">

    </div>

    <div class="footer-copy">

    </div>

<script>

const music = document.getElementById("bgMusic");
const icon = document.getElementById("musicIcon");

let playing = false;

function toggleMusic(){

    if(!playing){

        music.play();

        icon.classList.remove("fa-volume-up");
        icon.classList.add("fa-volume-xmark");

        playing = true;

    }else{

        music.pause();

        icon.classList.remove("fa-volume-xmark");
        icon.classList.add("fa-volume-up");

        playing = false;
    }
}

</script>

</body>
