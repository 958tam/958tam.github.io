<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universul #TAM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

/* COVER */

.hero{
    position:relative;
    height:45vh;
    background:url('cover.png') center center/cover no-repeat;
    display:flex;
    align-items:flex-end;
    justify-content:center;
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.15),
        rgba(0,0,0,0.75)
    );
}

/* TITLU */

.title{
    position:relative;
    z-index:2;

    width:100%;
    padding:40px 15px;

    text-align:center;

    font-family:'Permanent Marker',cursive;

    font-size:3.8vw;

    line-height:1.2;

    letter-spacing:2px;

    color:white;

    text-shadow:
        0 0 10px rgba(0,0,0,0.7),
        0 0 25px rgba(0,0,0,0.8);
}

/* SOCIAL BAR */

.social-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;

    padding:25px 10px;

    background:#181818;

    border-top:1px solid rgba(255,255,255,0.08);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.social-bar a{
    width:60px;
    height:60px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:50%;

    text-decoration:none;

    font-size:26px;

    color:white;

    background:rgba(255,255,255,0.08);

    transition:0.3s;
}

.social-bar a:hover{
    transform:translateY(-5px) scale(1.08);

    background:rgba(255,255,255,0.18);
}

/* CONTINUT */

.content{
    padding:40px 25px;
    max-width:900px;
    margin:auto;
}

.content h2{
    font-size:32px;
    margin-bottom:20px;
}

.content p{
    color:#ccc;
    line-height:1.8;
    font-size:18px;
}

/* FOOTER BANNER */

.footer-banner{
    position:relative;

    height:160px;

    background:
        linear-gradient(
            to bottom,
            rgba(0,0,0,0.2),
            rgba(0,0,0,0.8)
        ),
        url('footer.png') center center/cover no-repeat;
}

/* FOOTER */

.footer{
    background:#0a0a0a;

    text-align:center;

    padding:50px 20px;
}

.footer-logo{
    font-family:'Permanent Marker',cursive;

    font-size:34px;

    margin-bottom:18px;

    letter-spacing:2px;
}

.footer-quote{
    color:#999;

    font-size:16px;

    line-height:1.8;

    max-width:700px;

    margin:auto auto 35px auto;
}

.footer-social{
    display:flex;

    justify-content:center;

    gap:20px;

    margin-bottom:30px;
}

.footer-social a{
    color:white;

    font-size:22px;

    transition:0.3s;
}

.footer-social a:hover{
    transform:scale(1.2);

    color:#ccc;
}

.footer-copy{
    color:#666;

    font-size:14px;
}

</style>
</head>

<body>

<section class="hero">

    <div class="overlay"></div>

    <div class="title">
        BINE AI VENIT ÎN UNIVERSUL #TAM
    </div>

</section>

<section class="social-bar">

    <a href="#">
        <i class="fab fa-youtube"></i>
    </a>

    <a href="#">
        <i class="fab fa-facebook-f"></i>
    </a>

    <a href="#">
        <i class="fab fa-tiktok"></i>
    </a>

    <a href="#">
        <i class="fab fa-instagram"></i>
    </a>

    <a href="#">
        <i class="fab fa-whatsapp"></i>
    </a>

</section>

<section class="content">

    <h2>Începutul</h2>

    <p>
        Acesta este spațiul unde ideile, gândurile și experiențele
        prind viață.
    </p>

</section>

<section class="footer-banner"></section>

<footer class="footer">

    <div class="footer-logo">
        #TAM Universe
    </div>

    <div class="footer-quote">
        Știm că este puțin, dar orice construcție se realizează în timp.
    </div>

    <div class="footer-social">

        <a href="#">
            <i class="fab fa-youtube"></i>
        </a>

        <a href="#">
            <i class="fab fa-facebook-f"></i>
        </a>

        <a href="#">
            <i class="fab fa-tiktok"></i>
        </a>

        <a href="#">
            <i class="fab fa-instagram"></i>
        </a>

        <a href="#">
            <i class="fab fa-whatsapp"></i>
        </a>

    </div>

    <div class="footer-copy">
        © 2026 #TAM
    </div>

</footer>

</body>
</html>
